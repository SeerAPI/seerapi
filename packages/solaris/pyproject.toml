[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[project]
name = "solaris"
version = "106.0.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "anycrc>=1.3.5",
  "click>=8.2.1",
  "httpx>=0.28.1",
  "openapi-pydantic>=0.5.1",
  "pydantic>=2.11.7",
  "pydantic-settings>=2.10.1",
  "seerapi-models>=106.0.0,<107.0.0",
  "sqlmodel>=0.0.24",
  "tqdm>=4.67.1",
  "xmltodict>=1.0.2",
]

[project.scripts]
solaris = "solaris.__main__:main"

[tool.uv.build-backend]
module-root = ""
module-name = "solaris"

[tool.uv.sources]
seerapi-models = { workspace = true }

[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.format]
indent-style = "space"

[tool.ruff.lint]
extend-ignore = ["W191", "E101"]

[dependency-groups]
dev = ["ruff>=0.13.0", "pytest>=9.0.1"]
