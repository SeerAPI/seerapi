[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[project]
name = "seerapi-solaris"
version = "106.0.0"
description = "支持Unity端解析的赛尔号客户端数据解析/整理工具"
authors = [{ name = "Nattsu39", email = "Nattsu39@outlook.com" }]
readme = "README.md"
keywords = ["seerapi"]
license = { file = "LICENSE" }
classifiers = [
  "Operating System :: OS Independent",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
requires-python = ">=3.10"
dependencies = [
  "anycrc>=1.3.5",
  "click>=8.2.1",
  "httpx>=0.28.1",
  "openapi-pydantic>=0.5.1",
  "pydantic>=2.11.7",
  "pydantic-settings>=2.10.1",
  "seerapi-models>=106.0.0,<107.0.0",
  "sqlmodel>=0.0.24",
  "tqdm>=4.67.1",
  "xmltodict>=1.0.2",
]
[project.urls]
Homepage = "https://github.com/SeerAPI/seerapi"
Repository = "https://github.com/SeerAPI/seerapi"

[project.scripts]
solaris = "solaris.__main__:main"

[tool.uv.build-backend]
module-root = ""
module-name = "solaris"

[tool.uv.sources]
seerapi-models = { workspace = true }

[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.format]
indent-style = "space"

[tool.ruff.lint]
extend-ignore = ["W191", "E101"]

[dependency-groups]
dev = ["ruff>=0.13.0", "pytest>=9.0.1"]
