[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[project]
name = "seerapi"
version = "106.1.0"
description = "SeerAPI Python Client"
authors = [{ name = "Nattsu39", email = "Nattsu39@outlook.com" }]
license = { file = "LICENSE" }
keywords = ["seerapi", "client"]
classifiers = [
	"Operating System :: OS Independent",
	"Intended Audience :: Developers",
	"License :: OSI Approved :: MIT License",
	"Programming Language :: Python :: 3.10",
	"Programming Language :: Python :: 3.11",
	"Programming Language :: Python :: 3.12",
	"Programming Language :: Python :: 3.13",
	"Programming Language :: Python :: 3.14",
]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
	"hishel[httpx]>=1.1.5",
	"httpx>=0.28.1",
	"seerapi-models>=106.1.0,<107.0.0",
	"typing-extensions>=4.15.0",
]

[project.urls]
Homepage = "https://github.com/SeerAPI/seerapi"
Repository = "https://github.com/SeerAPI/seerapi"

[tool.uv.build-backend]
module-root = ""
module-name = "seerapi"

[tool.uv.sources]
seerapi-models = { workspace = true }

[tool.ruff]
extend = "../../pyproject.toml"
exclude = ["./scripts"]
